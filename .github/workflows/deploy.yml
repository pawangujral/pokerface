name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.FIREBASE_API_KEY }}" ]            && missing+=("FIREBASE_API_KEY")
          [ -z "${{ secrets.FIREBASE_DATABASE_URL }}" ]       && missing+=("FIREBASE_DATABASE_URL")
          [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ]         && missing+=("FIREBASE_PROJECT_ID")
          [ -z "${{ secrets.FIREBASE_APP_ID }}" ]             && missing+=("FIREBASE_APP_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Missing required GitHub secrets: ${missing[*]}"
            echo "Please add these secrets in Settings → Secrets → Actions."
            exit 1
          fi

      - name: Inject Firebase config
        run: |
          cat > js/firebase-config.js << 'SCRIPT'
          export const firebaseConfig = {
              apiKey: "${{ secrets.FIREBASE_API_KEY }}",
              authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
              databaseURL: "${{ secrets.FIREBASE_DATABASE_URL }}",
              projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
              storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
              messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
              appId: "${{ secrets.FIREBASE_APP_ID }}",
              measurementId: "${{ secrets.FIREBASE_MEASUREMENT_ID }}",
          };
          SCRIPT

      - name: Remove gitignore so generated files are included in artifact
        run: rm .gitignore

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
