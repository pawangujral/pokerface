<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Poker — Free Online Scrum Estimation Tool | No Ads, No Sign-up</title>
    <meta name="description" content="Free online planning poker tool for agile teams. Estimate story points together in real-time. No ads, no sign-up required — just create a session and start estimating.">
    <meta name="keywords" content="planning poker, scrum poker, story point estimation, agile estimation, free planning poker, sprint planning tool, scrum estimation, team estimation, fibonacci estimation, poker planning online">
    <meta name="author" content="PokerFace">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://pawangujral.github.io/pokerface/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Planning Poker — Free Online Estimation Tool">
    <meta property="og:description" content="Estimate story points together in real-time. Free, no ads, no sign-up required.">
    <meta property="og:url" content="https://pawangujral.github.io/pokerface/">
    <meta property="og:site_name" content="PokerFace">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Planning Poker — Free Online Estimation Tool">
    <meta name="twitter:description" content="Estimate story points together in real-time. Free, no ads, no sign-up required.">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "PokerFace — Planning Poker",
        "description": "Free online planning poker tool for agile teams. Estimate story points together in real-time with no ads and no sign-up.",
        "url": "https://pawangujral.github.io/pokerface/",
        "applicationCategory": "ProjectManagement",
        "operatingSystem": "Any",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        },
        "featureList": ["Real-time estimation", "No sign-up required", "No ads", "Fibonacci & custom scales", "Instant session sharing"]
    }
    </script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Landing Page -->
    <div id="landing-page" class="page">
        <div class="container">
            <h1>Show us your poker face!</h1>
            <p class="subtitle">Estimate together, ship faster</p>

            <div class="card">
                <button id="btn-create" class="btn btn-primary btn-large">Create Session</button>
                <div class="divider"><span>or</span></div>
                <div class="join-group">
                    <input type="text" id="input-session-code" placeholder="Enter session code" maxlength="20">
                    <button id="btn-join" class="btn btn-secondary">Join</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Name Entry Page -->
    <div id="name-page" class="page hidden">
        <div class="container">
            <h1>&#9824; Planning Poker</h1>
            <div class="card">
                <h2>What's your name?</h2>
                <div class="name-group">
                    <input type="text" id="input-name" placeholder="Enter your name" maxlength="30" autocomplete="off">
                </div>
                <h2 class="role-heading">What's your role?</h2>
                <div class="role-selector" id="role-selector">
                    <button type="button" class="role-chip" data-role="Developer">Developer</button>
                    <button type="button" class="role-chip" data-role="QA">QA</button>
                    <button type="button" class="role-chip" data-role="DevOps/SRE">DevOps/SRE</button>
                    <button type="button" class="role-chip" data-role="Designer">Designer</button>
                    <button type="button" class="role-chip" data-role="Business">Business</button>
                </div>
                <label class="spectator-toggle">
                    <input type="checkbox" id="chk-spectator">
                    <span>Join as spectator (watch only)</span>
                </label>
                <button id="btn-enter" class="btn btn-primary btn-large" disabled>Enter</button>
            </div>
        </div>
    </div>

    <!-- Session Room -->
    <div id="session-page" class="page hidden">
        <div class="container">
            <header class="session-header">
                <h1>&#9824; Planning Poker</h1>
                <div class="session-info">
                    <span id="session-code-display" class="session-code"></span>
                    <button id="btn-copy-link" class="btn btn-small" title="Copy invite link">&#128203; Copy Link</button>
                    <a href="help.html" target="_blank" class="btn btn-small" title="Help">? Help</a>
                </div>
            </header>

            <div class="session-layout">
                <!-- Participants Panel -->
                <div id="participants-container" class="participants-container"></div>

                <!-- Main Area -->
                <div class="main-area">
                    <!-- Timer + Action Buttons -->
                    <div class="actions">
                        <button id="btn-reveal" class="btn btn-primary">Show Votes</button>
                        <button id="btn-new-round" class="btn btn-secondary">New Round</button>
                        <div class="timer-group">
                            <select id="timer-select">
                                <option value="">Timer</option>
                                <option value="30">0:30</option>
                                <option value="60">1:00</option>
                                <option value="90">1:30</option>
                                <option value="120">2:00</option>
                            </select>
                            <button id="btn-timer" class="btn btn-small">Start</button>
                        </div>
                    </div>

                    <!-- Timer Display -->
                    <div id="timer-bar" class="timer-bar hidden">
                        <div id="timer-fill" class="timer-fill"></div>
                        <span id="timer-text" class="timer-text">0:00</span>
                        <button id="btn-timer-stop" class="btn-timer-stop" title="Stop timer">&times;</button>
                    </div>

                    <!-- Results (shown after reveal) -->
                    <div id="results-panel" class="results-panel hidden"></div>

                    <!-- Spectator waiting view (shown to spectators during voting) -->
                    <div id="spectator-waiting" class="spectator-waiting hidden">
                        <!-- Circular progress ring -->
                        <div class="spectator-ring-wrap">
                            <svg class="spectator-ring" viewBox="0 0 120 120">
                                <circle class="spectator-ring-track" cx="60" cy="60" r="52" />
                                <circle id="spectator-ring-progress" class="spectator-ring-value" cx="60" cy="60" r="52"
                                        stroke-dasharray="326.73" stroke-dashoffset="326.73" />
                            </svg>
                            <div class="spectator-ring-label">
                                <span id="spectator-voted-count" class="spectator-ring-big">0</span>
                                <span class="spectator-ring-sep">/</span>
                                <span id="spectator-total-count" class="spectator-ring-small">0</span>
                            </div>
                        </div>
                        <p class="spectator-headline" id="spectator-headline">Waiting for votes...</p>

                        <!-- Voter avatars grid -->
                        <div id="spectator-avatars" class="spectator-avatars"></div>

                        <!-- Per-role breakdown -->
                        <div id="spectator-role-status" class="spectator-role-status"></div>
                    </div>

                    <!-- Estimation Cards -->
                    <div id="estimation-section" class="estimation-section">
                        <h3>Pick your estimate <span class="kbd-hint">(or press 0-9 keys)</span></h3>
                        <div id="estimation-cards" class="estimation-cards">
                            <!-- Cards injected by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Emoji Reactions (floating, bottom-right) -->
    <div id="reactions-bar" class="reactions-bar hidden">
        <button class="reaction-btn" data-emoji="👍">👍</button>
        <button class="reaction-btn" data-emoji="🤔">🤔</button>
        <button class="reaction-btn" data-emoji="😱">😱</button>
        <button class="reaction-btn" data-emoji="🎯">🎯</button>
        <button class="reaction-btn" data-emoji="💀">💀</button>
    </div>
    <div id="reaction-floats" class="reaction-floats"></div>

    <!-- Confetti canvas -->
    <canvas id="confetti-canvas" class="confetti-canvas"></canvas>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>

    <footer class="site-footer">
        <p>Estimated at 1 point. Took 13. Shipped anyway by <a href="https://pawangujral.dev/" target="_blank" rel="noopener">Pawan Gujral</a></p>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
